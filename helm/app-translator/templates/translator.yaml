apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
spec:
  replicas: {{ .Values.translator.replicas }}
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
      - name: translator
        image: {{ .Values.translator.image }}
        imagePullPolicy: Never
        resources:
          requests:
            memory: {{ .Values.translator.resource.requests.memory | quote }}
            cpu: {{ .Values.translator.resource.requests.cpu | quote }}
          limits:
            memory: {{ .Values.translator.resource.limits.memory | quote }}
            cpu: {{ .Values.translator.resource.limits.cpu | quote }}
        env:
        - name: LT_UPDATE_MODELS
          value: "false"
        - name: LT_OFFLINE
          value: "true" 
        ports:
        - containerPort: {{ .Values.translator.port }}
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 5000
        #   initialDelaySeconds: 300
        #   timeoutSeconds: 10
        #   periodSeconds: 10
        #   failureThreshold: 5
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: 5000
        #   initialDelaySeconds: 60
        #   timeoutSeconds: 10
        #   periodSeconds: 10
        #   failureThreshold: 5
      

---
apiVersion: v1
kind: Service
metadata:
  name: translator-service
spec:
  selector:
    app: translator
  ports:
  - protocol: TCP
    port: {{ .Values.translator.port }}
    targetPort: {{ .Values.translator.port }}

    
