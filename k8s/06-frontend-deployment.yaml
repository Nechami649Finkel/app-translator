apiVersion: apps/v1
kind: Deployment
metadata: 
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: IfNotPresent
        # imagePullPolicy: Never
        livenessProbe:
          httpGet: 
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds : 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3




        ports:
        - containerPort: 80